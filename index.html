<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地域活動DB 安定版16</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f7f3;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:#1f2937}
#app{max-width:560px;margin:0 auto;padding:16px 14px 90px}
h1{font-size:22px;margin:0}
.header{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:12px}
.sub{font-size:12px;color:#6b7280;margin-top:4px}
.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:800;background:white;color:#2f6f3e;box-shadow:0 3px 12px rgba(0,0,0,.08);font-family:inherit}
.btn-primary{background:#2f6f3e;color:white}
.btn-danger{background:#fee2e2;color:#b91c1c}
.panel{background:white;border-radius:16px;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.08);margin-bottom:12px}
.progress-head{display:flex;justify-content:space-between;font-size:13px;font-weight:900;margin-bottom:8px}
.progress-bar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:#2f6f3e;width:0%}
.status{font-size:11px;color:#6b7280;font-weight:700;margin-top:6px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;background:#e8efe7;border-radius:16px;padding:5px;margin:12px 0}
.tab{border:0;background:transparent;padding:10px 4px;border-radius:12px;font-weight:800;color:#526052;font-family:inherit}
.tab.active{background:white;color:#111827;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.row{display:flex;gap:8px;margin:10px 0}
.row input{flex:1}
input,select,textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;font-size:16px;font-family:inherit;background:white}
textarea{min-height:80px}
#map{height:410px;border-radius:18px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.legend{display:flex;gap:6px;flex-wrap:wrap;background:white;border-radius:14px;padding:10px;margin-top:10px;box-shadow:0 3px 12px rgba(0,0,0,.08);font-size:11px;font-weight:800}
.legend span{background:#f9fafb;border-radius:999px;padding:5px 8px}
.list{display:flex;flex-direction:column;gap:9px}
.card{background:white;border-radius:16px;padding:13px;box-shadow:0 3px 12px rgba(0,0,0,.08);border-left:6px solid #94a3b8}
.card-title{font-weight:900}
.card-sub{font-size:12px;color:#6b7280;margin-top:4px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:11px;background:#f3f4f6;border-radius:999px;padding:4px 8px;font-weight:700}
.card-actions{display:flex;gap:8px;margin-top:10px}
.card-actions .btn{flex:1;box-shadow:none;background:#f3f4f6}
.empty{text-align:center;color:#9ca3af;padding:40px 12px;line-height:1.8}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:9999}
.modal{width:100%;max-width:560px;margin:0 auto;background:white;border-radius:24px 24px 0 0;max-height:92vh;overflow:auto;padding:20px 16px 24px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-title{font-size:18px;font-weight:900}
.close{border:0;background:#f3f4f6;border-radius:999px;font-size:22px;width:38px;height:38px}
.section{border-top:1px solid #eef0f2;padding-top:14px;margin-top:14px}
.section:first-of-type{border-top:0;margin-top:0}
.label{display:block;font-size:13px;font-weight:900;color:#4b5563;margin:0 0 7px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-btn{border:2px solid #e5e7eb;background:white;border-radius:12px;padding:12px 6px;font-weight:900;font-family:inherit}
.status-btn.active{background:#dcfce7;border-color:#22c55e;color:#166534}
.check{display:flex;align-items:center;gap:10px;background:#fff8e1;border:1.5px solid #fde68a;border-radius:12px;padding:12px;font-weight:900;color:#92400e}
.check input{width:22px;height:22px;margin:0}
.form-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:sticky;bottom:0;background:white;padding-top:12px;margin-top:14px}
.form-actions button{padding:14px;font-size:17px}
.analysis-card{background:white;border-radius:16px;padding:14px;box-shadow:0 3px 12px rgba(0,0,0,.08);margin-bottom:12px}
.analysis-title{font-weight:900;margin-bottom:8px}
.analysis-row{display:flex;justify-content:space-between;border-top:1px solid #eef0f2;padding:9px 0}
.analysis-row:first-of-type{border-top:0}
.err{display:none;background:#fee2e2;color:#991b1b;border-radius:12px;padding:10px;font-weight:800;margin:10px 0}
.pin-badge{position:absolute;right:-8px;top:-8px;min-width:18px;height:18px;border-radius:999px;background:#111827;color:white;font-size:10px;line-height:18px;text-align:center;font-weight:900;border:2px solid white}
@media(max-width:390px){#map{height:370px}}

.heatmap-legend{
  background:white;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
  font-size:11px;
  font-weight:800;
  color:#374151;
  display:none;
}
.heatmap-legend .bar{
  height:10px;
  border-radius:999px;
  background:linear-gradient(90deg,#bbf7d0,#fde68a,#fb923c,#ef4444);
  margin:7px 0;
}


.lock-note{font-size:12px;color:#6b7280;line-height:1.6;margin-top:8px}

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>🏘️ 地域活動DB</h1>
      <div class="sub" id="areaLabel">地図をタップして訪問先を追加</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="downloadJSON()">📤</button>
      <button class="btn" onclick="downloadCSV()">CSV</button>
      <button class="btn" onclick="downloadMeiboCSV()">名簿CSV</button>
    </div>
  </div>

  <div id="err" class="err"></div>

  <div class="panel">
    <div class="progress-head">
      <span id="goalText">目標100件</span>
      <button class="btn" style="box-shadow:none;padding:7px 10px" onclick="openSettings()">変更</button>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div class="status" id="localStatus">端末保存：準備中</div>
    <div class="status" id="sheetStatus">シート連携：未設定</div>
  </div>

  <div class="tabs">
    <button id="tab-map" class="tab active" onclick="showView('map')">地図</button>
    <button id="tab-list" class="tab" onclick="showView('list')">一覧</button>
    <button id="tab-revisit" class="tab" onclick="showView('revisit')">再訪</button>
    <button id="tab-analysis" class="tab" onclick="showView('analysis')">分析</button>
  </div>

  <div id="view-map">
    <div class="row">
      <input id="searchText" placeholder="住所検索：名島5丁目 など">
      <button class="btn btn-primary" onclick="searchMap()">検索</button>
    </div>
    <div class="row">
      <button class="btn" style="flex:1" onclick="replaceFromSheet()">シート読込</button>
      <button class="btn" style="flex:1" onclick="fitAllPins()">地図を全体表示</button>
      <button class="btn" style="flex:1" onclick="toggleHouseholdHeatmap()">世帯人数表示</button>
    </div>
    <div id="map"></div>
    <div id="legend" class="legend"></div>
    <div id="heatmapLegend" class="heatmap-legend"><b>東区 町丁目別 世帯数ヒートマップ</b><div class="bar"></div><div>緑：少ない　黄：中　橙〜赤：多い</div><div style="margin-top:4px;color:#6b7280">※2026年4月30日町丁目別データ（東区）を使用。円の位置は簡易表示です。</div></div>
  </div>

  <div id="view-list" class="list" style="display:none"></div>
  <div id="view-revisit" class="list" style="display:none"></div>
  <div id="view-analysis" style="display:none"></div>
</div>

<div id="editModal" class="modal-bg" onclick="closeEdit()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div id="editTitle" class="modal-title">訪問先</div>
      <button class="close" onclick="closeEdit()">×</button>
    </div>

    <div class="section">
      <label class="label">表示住所・目印</label>
      <input id="address">
      <input id="lat" type="hidden"><input id="lng" type="hidden">
      <button class="btn" style="width:100%;margin-top:10px" onclick="openGoogle()">Googleマップで開く</button>
      <label class="label" style="margin-top:12px">名前・呼び名</label>
      <input id="personName" placeholder="例：山田さん、田中さん宅、○○商店">
    </div>

    <div class="section">
      <label class="label">エリア</label>
      <select id="area">
        <option>名島1丁目</option><option>名島2丁目</option><option>名島3丁目</option><option>名島4丁目</option><option selected>名島5丁目</option>
        <option>千早</option><option>香椎浜</option><option>その他</option>
      </select>
    </div>

    <div class="section">
      <label class="label">状態</label>
      <div id="statusGrid" class="status-grid"></div>
      <label class="label" style="margin-top:12px">支持者候補</label>
      <select id="supporter"><option value="">未設定</option><option>◎有力</option><option>○可能性あり</option><option>△様子見</option><option>×なし</option></select>
    </div>

    <div class="section">
      <label class="label">世帯属性</label>
      <select id="household"><option value="">不明</option><option>若い単身</option><option>ファミリー</option><option>高齢者世帯</option><option>多世代同居</option></select>
      <label class="label" style="margin-top:12px">接触相手</label>
      <select id="contact"><option value="">未設定</option><option>会えず</option><option>本人</option><option>配偶者</option><option>家族</option></select>
      <label class="label" style="margin-top:12px">再訪優先度</label>
      <select id="priority"><option value="">なし</option><option>△低</option><option>○中</option><option>◎高</option></select>
      <label class="label" style="margin-top:12px">紹介者</label>
      <input id="referrer" placeholder="例：紹介者名、紹介元、地域のつながり">
    </div>

    <div class="section">
      <label class="check"><input id="warning" type="checkbox" onchange="toggleWarn()">⚠️ 注意メモあり</label>
      <textarea id="warningMemo" style="display:none;margin-top:10px" placeholder="例：強い拒否、犬あり、複数人対応推奨"></textarea>
      <label class="check" style="margin-top:12px;background:#eef4ff;border-color:#bfdbfe;color:#1d4ed8"><input id="signboard" type="checkbox">看板あり</label>
      <label class="label" style="margin-top:12px">ポスター政党</label>
      <select id="poster"><option value="">なし・未確認</option><option>参政党</option><option>自民党</option><option>公明党</option><option>共産党</option><option>立憲民主党</option><option>国民民主党</option><option>維新</option><option>その他</option></select>
      <input id="posterMemo" style="margin-top:10px" placeholder="ポスター・看板メモ">
    </div>

    <div class="section">
      <label class="label">対象種別</label>
      <select id="type"><option>戸建て</option><option>集合住宅</option><option>事業所</option><option>その他</option></select>
      <label class="label" style="margin-top:12px">メモ</label>
      <textarea id="memo" placeholder="会話内容、関心事項、次回話すことなど"></textarea>
    </div>

    <div class="section">
      <label class="label">訪問日</label>
      <input id="date" type="date">
      <div class="row">
        <div style="flex:1"><label class="label">開始</label><input id="startTime" type="time" onchange="updateDuration()"></div>
        <div style="flex:1"><label class="label">終了</label><input id="endTime" type="time" onchange="updateDuration()"></div>
      </div>
      <div class="status" id="duration">滞在時間：未入力</div>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveRecord()">保存</button>
      <button class="btn btn-danger" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="modal-bg" onclick="closeSettings()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head"><div class="modal-title">設定</div><button class="close" onclick="closeSettings()">×</button></div>
    <div class="section">
      <label class="label">活動エリア名</label><input id="setArea">
      <label class="label" style="margin-top:12px">目標件数</label><input id="setGoal" type="number">
      <label class="label" style="margin-top:12px">担当者名</label><input id="setAssignee">
      <label class="label" style="margin-top:12px">Google連携URL</label>
      <div class="row" style="margin:0">
        <input id="setScript" placeholder="https://script.google.com/macros/s/.../exec">
        <button class="btn btn-danger" style="box-shadow:none;white-space:nowrap" onclick="clearScriptUrl()" type="button">クリア</button>
      </div>
      <label class="label" style="margin-top:12px">閲覧パスコード</label>
      <input id="setPasscode" type="password" placeholder="例：4桁以上。共有メンバーだけに伝える">
      <div class="lock-note">※名前・フル住所を扱うため、メンバーで同じパスコードを設定してください。</div>
      <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="saveSettings()">設定を保存</button>
      <button class="btn" style="width:100%;margin-top:10px;background:#eef4ff;color:#1d4ed8" onclick="replaceFromSheet()">🔄 シート完全同期</button>
      <button class="btn btn-danger" style="width:100%;margin-top:10px" onclick="clearLocalData()">🗑️ 端末データ削除</button>
      <div class="status">※シート読込はスプレッドシートを正として表示します。端末データ削除は、このスマホ内の保存だけを消します。</div>
    </div>
  </div>
</div>


<div id="lockModal" class="modal-bg" style="display:none;align-items:center">
  <div class="modal" style="border-radius:24px;max-height:none" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">🔒 地域活動DB</div>
    </div>
    <div class="section">
      <label class="label">閲覧パスコード</label>
      <input id="unlockPasscode" type="password" placeholder="パスコードを入力">
      <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="unlockApp()">開く</button>
      <div class="lock-note">名前や住所を扱うため、共有メンバー以外には開かせない運用にしてください。</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORE_KEY="chiiki-katsudo-db-simple-records";
const SETTING_KEY="chiiki-katsudo-db-simple-settings";
const STATUS={
  unvisited:{label:"未訪問",color:"#94a3b8"},
  visited:{label:"訪問済み",color:"#3b82f6"},
  good:{label:"手応えあり",color:"#22c55e"},
  absent:{label:"不在",color:"#f59e0b"},
  revisit:{label:"要再訪",color:"#ef4444"},
  refused:{label:"断られた",color:"#6b7280"}
};
let records=[];
let settings={areaName:"名島5丁目",goal:100,assignee:"未設定",scriptUrl:"",passcode:""};
let map=null;
let markers={};
let householdHeatLayer=null;
let householdHeatVisible=false;
let editing=null;
let editStatus="unvisited";


function requireUnlock(){
  if(!settings.passcode){
    return false;
  }
  if(sessionStorage.getItem("chiiki-db-unlocked") === "1"){
    return false;
  }
  const modal = document.getElementById("lockModal");
  if(modal) modal.style.display = "flex";
  return true;
}
function unlockApp(){
  const input = document.getElementById("unlockPasscode");
  const val = input ? input.value : "";
  if(!settings.passcode || val === settings.passcode){
    sessionStorage.setItem("chiiki-db-unlocked","1");
    const modal = document.getElementById("lockModal");
    if(modal) modal.style.display = "none";
  }else{
    alert("パスコードが違います");
  }
}

function err(m){document.getElementById("err").style.display="block";document.getElementById("err").textContent=m;console.error(m);}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function now(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function min(t){if(!t)return null;const a=t.split(":").map(Number);return a[0]*60+a[1];}
function calcDur(s,e){const a=min(s),b=min(e);if(a===null||b===null)return null;let d=b-a;if(d<0)d+=1440;return d;}
function dtext(m){if(m===null||m===undefined||isNaN(m))return"未入力";return m<60?m+"分":Math.floor(m/60)+"時間"+(m%60?m%60+"分":"");}
function norm(s){return String(s||"").replace(/日本/g,"").replace(/〒?\d{3}-?\d{4}/g,"").replace(/一丁目/g,"1丁目").replace(/二丁目/g,"2丁目").replace(/三丁目/g,"3丁目").replace(/四丁目/g,"4丁目").replace(/五丁目/g,"5丁目").replace(/,/g," ").replace(/、/g," ").replace(/\s+/g," ").trim();}
function shortAddr(s){s=norm(s);const p=s.split(/\s+/).filter(Boolean);return p.find(x=>/(名島|千早|香椎浜|城浜|松崎|若宮|水谷)/.test(x))||p.slice(0,2).join(" ")||s;}
function guessArea(s){s=norm(s);for(const a of ["名島1丁目","名島2丁目","名島3丁目","名島4丁目","名島5丁目","千早","香椎浜"]){if(s.includes(a))return a;}return settings.areaName;}
function gmap(lat,lng){return "https://www.google.com/maps?q="+lat+","+lng;}

function isValidMapCoord(lat,lng){
  lat = Number(lat);
  lng = Number(lng);
  // 福岡市周辺だけ許可。誤読で海・海外へ飛ぶのを防ぐ。
  return !isNaN(lat) && !isNaN(lng) && lat >= 30 && lat <= 36 && lng >= 128 && lng <= 133;
}
function cleanCoordRecord(r){
  if(!isValidMapCoord(r.lat, r.lng)){
    r.lat = null;
    r.lng = null;
  }
  return r;
}


function parseLatLngFromText(text){
  const s = String(text || "");
  const m = s.match(/q=([0-9.\-]+),([0-9.\-]+)/) || s.match(/@([0-9.\-]+),([0-9.\-]+)/) || s.match(/([0-9]{2}\.[0-9]+)\s*,\s*(1[0-9]{2}\.[0-9]+)/);
  if(!m) return {lat:null,lng:null};
  return {lat:Number(m[1]), lng:Number(m[2])};
}
function prettyAddress(s){
  s = norm(s);
  // Nominatimの「国道3号 千早2丁目 香椎団地 東区 福岡市 福岡県」系を少し読みやすくする
  const ward = s.includes("東区") ? "東区" : "";
  const city = s.includes("福岡市") ? "福岡市" : "";
  const pref = s.includes("福岡県") ? "福岡県" : "";
  const townMatch = s.match(/(名島[1-5]丁目|千早[1-6]丁目|香椎浜[1-4]丁目|松崎[1-4]丁目|城浜団地|香椎団地)/);
  const roadMatch = s.match(/(国道[0-9]+号)/);
  const parts = [pref, city, ward, townMatch ? townMatch[1] : "", roadMatch ? roadMatch[1] : ""].filter(Boolean);
  return parts.length ? parts.join(" ") : s;
}

function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

window.addEventListener("load",function(){
  try{
    records=JSON.parse(localStorage.getItem(STORE_KEY)||"[]");
    settings={...settings,...JSON.parse(localStorage.getItem(SETTING_KEY)||"{}")};
    initMap();
    render();
    requireUnlock();
    saveLocal();
  }catch(e){err("起動エラー："+e.message);}
});

function saveLocal(){
  localStorage.setItem(STORE_KEY,JSON.stringify(records));
  localStorage.setItem(SETTING_KEY,JSON.stringify(settings));
  document.getElementById("localStatus").textContent="端末保存：完了（"+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+"）";
}
function sheetStatus(m){document.getElementById("sheetStatus").textContent="シート連携："+(settings.scriptUrl?(m||"準備OK"):"未設定");}

function initMap(){
  map=L.map("map").setView([33.6452,130.4319],15);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
  map.on("click",async function(e){
    const lat=Number(e.latlng.lat.toFixed(6));
    const lng=Number(e.latlng.lng.toFixed(6));
    let addr=lat+", "+lng;
    try{
      const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+lat+"&lon="+lng+"&accept-language=ja");
      const j=await r.json();
      addr=j.display_name||addr;
    }catch(ex){}
    const s=shortAddr(addr);

async function searchMap(){

function fitAllPins(){
  const pts = records
    .filter(r => isValidMapCoord(r.lat,r.lng))
    .map(r => [Number(r.lat), Number(r.lng)]);
  if(!pts.length){

  }else{
    map.fitBounds(pts, {padding:[35,35], maxZoom:18});

function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));

function heatColor(value, min, max){
  const t = max === min ? 0 : (value - min) / (max - min);
  if(t < 0.25) return "#22c55e";
  if(t < 0.50) return "#eab308";
  if(t < 0.75) return "#f97316";
  return "#ef4444";
}

function visitsForTown(name){
  return records.filter(r => (r.area === name || (r.address && r.address.includes(name)) || (r.fullAddress && r.fullAddress.includes(name))) && r.status && r.status !== "unvisited").length;
}

function drawHouseholdHeatmap(){
  if(householdHeatLayer){
    map.removeLayer(householdHeatLayer);
    householdHeatLayer = null;
  }
  householdHeatLayer = L.layerGroup();
  const vals = HIGASHIKU_TOWN_DATA.map(a=>a.households);
  const min = Math.min(...vals);
  const max = Math.max(...vals);

  HIGASHIKU_TOWN_DATA.forEach(a=>{
    const color = heatColor(a.households, min, max);
    const radius = 90 + Math.min(520, Math.sqrt(a.households) * 8);
    const visited = visitsForTown(a.name);
    const rate = a.households ? ((visited / a.households) * 100).toFixed(1) : "0.0";
    const circle = L.circle([a.lat, a.lng], {
      radius,
      color,
      weight:1,
      fillColor:color,
      fillOpacity:0.28
    });
    circle.bindTooltip(`${a.name}：${a.households.toLocaleString()}世帯 / ${a.population.toLocaleString()}人 / 訪問${visited}件 / 進捗${rate}%`);
    circle.on("click",()=>{
      alert(`${a.name}\n世帯数：${a.households.toLocaleString()}\n人口：${a.population.toLocaleString()}\n訪問済：${visited}件\n進捗：${rate}%`);
    });
    householdHeatLayer.addLayer(circle);
  });
  householdHeatLayer.addTo(map);
}

function rowToRecord(row){
  const sm={"未訪問":"unvisited","訪問済み":"visited","手応えあり":"good","不在":"absent","要再訪":"revisit","断られた":"refused"};
  let latNum = parseNum(pick(row,["緯度","lat","Lat","latitude","Latitude"]));
  let lngNum = parseNum(pick(row,["経度","lng","Lng","lon","Lon","longitude","Longitude"]));

  if(!isValidMapCoord(latNum,lngNum)){
    const fromUrl = parseLatLngFromText(pick(row,["GoogleマップURL","Google Maps URL","mapUrl"]));
    latNum = fromUrl.lat;
    lngNum = fromUrl.lng;
  }

  const rawFull = pick(row,["フル住所","fullAddress"]) || "";
  const rawAddress = pick(row,["住所表示","住所","address"]) || "";

  const rec = {
    id: pick(row,["ID","id"]) || id(),
    createdAt: pick(row,["登録日時","createdAt"]) || "",
    updatedAt: pick(row,["更新日時","updatedAt"]) || "",
    date: pick(row,["訪問日","date"]) || "",
    startTime: pick(row,["訪問開始","startTime"]) || "",
    endTime: pick(row,["訪問終了","endTime"]) || "",
    durationMinutes: Number(pick(row,["滞在時間(分)","durationMinutes"]) || 0) || null,
    area: pick(row,["エリア","area"]) || settings.areaName,
    address: rawAddress ? shortAddr(rawAddress) : shortAddr(rawFull),
    fullAddress: rawFull ? prettyAddress(rawFull) : "",
    status: sm[pick(row,["状態","status"])] || pick(row,["状態","status"]) || "unvisited",
    type: pick(row,["対象種別","type"]) || "戸建て",
    householdType: pick(row,["世帯属性","householdType"]) || "",
    contactPerson: pick(row,["接触相手","contactPerson"]) || "",
    revisitPriority: pick(row,["再訪優先度","revisitPriority"]) || "",
    referrer: pick(row,["紹介者","referrer"]) || "",
    personName: pick(row,["名前","氏名","呼び名","personName"]) || "",
    supporter: pick(row,["支持者候補","supporter"]) || "",
    warning: pick(row,["注意","warning"]) === "○" || pick(row,["注意","warning"]) === "true" || pick(row,["注意","warning"]) === "TRUE",
    warningMemo: pick(row,["注意メモ","warningMemo"]) || "",
    signboard: pick(row,["看板","signboard"]) === "○" || pick(row,["看板","signboard"]) === "true" || pick(row,["看板","signboard"]) === "TRUE",
    posterParty: pick(row,["ポスター","ポスター・看板","posterParty"]) || "",
    posterMemo: pick(row,["ポスターメモ","posterMemo"]) || "",
    memo: pick(row,["メモ","memo"]) || "",
    lat: latNum,
    lng: lngNum,
    assignee: pick(row,["担当者","assignee"]) || ""
  };
  return cleanCoordRecord(rec);
}
async function fetchSheetRecords(){
  const response = await fetch(settings.scriptUrl + "?action=list&passcode=" + encodeURIComponent(settings.passcode||"") + "&ts=" + Date.now());
  const data = await response.json();
  const rawRows = Array.isArray(data.rows) ? data.rows : [];
  const converted = rawRows.map(rowToRecord);
  const withLocation = converted.filter(x => isValidMapCoord(x.lat, x.lng));
  return {rawRows, converted, withLocation};
}


async function loadSheet(){
  await replaceFromSheet();
}

async function replaceFromSheet(){
  if(!settings.scriptUrl){
    alert("Google連携URLを設定してください");
    return;
  }

  try{
    sheetStatus("シート読込中");

    const beforeCount = records.length;
    const {rawRows, converted, withLocation} = await fetchSheetRecords();
    const skippedBadCoord = converted.length - withLocation.length;

    // シンプル運用：スプレッドシートを正本にする
    records = withLocation.map(x => ({...x, lat:Number(x.lat), lng:Number(x.lng)}));

    saveLocal();
    render();

    if(records.length > 0){
      setTimeout(()=>fitAllPins(), 150);
    }else{
      map.setView([33.6452,130.4319],15);
      setTimeout(()=>map.invalidateSize(),100);
    }

    sheetStatus("読込 " + records.length + "件");

    alert(
      "シート読込\n" +
      "シート行数：" + rawRows.length + "件\n" +
      "地図表示：" + records.length + "件\n" +
      "座標不正で除外：" + skippedBadCoord + "件\n" +
      "読込前：" + beforeCount + "件\n" +
      "読込後：" + records.length + "件"
    );

  }catch(e){
    sheetStatus("読込失敗");
    err("シート読込エラー：" + e.message);
    alert("シート読込に失敗しました。Google連携URLとApps Scriptの公開設定を確認してください。");
    render();
  }
}

async function syncAll(){
  if(!settings.scriptUrl){
    alert("Google連携URLを設定してください");
    return;
  }
  if(!confirm(records.length+"件をスプレッドシートへ送信しますか？")) return;
  for(const r of records) await sendSheet(r);
  alert("送信しました");
}

async function resyncFromSheet(){
  await replaceFromSheet();
}
function downloadCSV(){
  const headers=["ID","担当者","エリア","住所表示","フル住所","状態","対象種別","世帯属性","接触相手","再訪優先度","紹介者","訪問日","訪問開始","訪問終了","滞在時間(分)","支持者候補","注意","注意メモ","看板","ポスター","ポスターメモ","メモ","緯度","経度","GoogleマップURL"];
  const rows=records.map(r=>[r.id,r.assignee,r.area,r.address,r.fullAddress,(STATUS[r.status]||STATUS.unvisited).label,r.type,r.householdType,r.contactPerson,r.revisitPriority,r.referrer,r.date,r.startTime,r.endTime,r.durationMinutes??"",r.supporter,r.warning?"○":"",r.warningMemo,r.signboard?"○":"",r.posterParty,r.posterMemo,r.memo,r.lat,r.lng,gmap(r.lat,r.lng)]);
  const csv="\uFEFF"+[headers,...rows].map(row=>row.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  download(csv,"chiiki-katsudo-db.csv","text/csv");
}
